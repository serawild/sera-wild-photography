<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sera Wild Photography</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background-color: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .divider {
      width: 60px;
      height: 1px;
      background-color: #888;
      margin: 1.5rem auto;
    }

    p {
      font-size: 1rem;
      color: #999;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sera Wild Photography</h1>
    <div class="divider"></div>
    <p>Website folgt in Kürze.</p>
  </div>
</body>
</html>
